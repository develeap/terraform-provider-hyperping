name: API Documentation Scraper

on:
  # Run twice daily at 2 AM and 2 PM UTC
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 14 * * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'scrape-and-analyze'
        type: choice
        options:
          - scrape-and-analyze
          - scrape-only
          - analyze-only
      log_level:
        description: 'Log level'
        required: false
        default: 'info'
        type: choice
        options:
          - debug
          - info
          - warn
          - error

permissions:
  contents: read
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip scraping if analyze-only mode
    if: ${{ github.event.inputs.mode != 'analyze-only' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1  # Full history for proper caching

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'tools/cmd/scraper/go.mod'
          cache-dependency-path: tools/cmd/scraper/go.sum

      - name: Restore cache and snapshots
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            tools/cmd/scraper/.scraper_cache.json
            tools/cmd/scraper/snapshots/
            tools/cmd/scraper/docs_scraped/
          key: scraper-data-${{ github.run_id }}
          restore-keys: |
            scraper-data-

      - name: Build scraper
        working-directory: tools/cmd/scraper
        run: go build -o scraper

      - name: Run scraper
        working-directory: tools/cmd/scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          LOG_FORMAT: json
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
          CHROME_BIN: google-chrome-stable   # use pre-installed Chrome on ubuntu-latest
        run: |
          ./scraper 2>&1 | tee scraper.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Upload scraper logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: scraper-logs-${{ github.run_id }}
          path: tools/cmd/scraper/scraper.log
          retention-days: 30

      - name: Upload diff reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: diff-reports-${{ github.run_id }}
          path: tools/cmd/scraper/api_changes_*.md
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload scraped data
        if: success()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: scraped-data-${{ github.run_id }}
          path: tools/cmd/scraper/docs_scraped/
          retention-days: 7

      - name: Check for failures
        if: env.EXIT_CODE != '0'
        run: |
          echo "Scraper failed with exit code $EXIT_CODE"
          exit 1

      - name: Post summary
        if: always()
        run: |
          cd tools/cmd/scraper

          echo "## Scraper Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "**Run Number:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Exit Code:** ${EXIT_CODE:-unknown}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Extract metrics from log (if available)
          if [ -f scraper.log ]; then
            echo "### Metrics" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "(Scraped|Skipped|Failed|Duration|Cache)" scraper.log | head -20 >> $GITHUB_STEP_SUMMARY || echo "No metrics found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          # List diff reports
          if ls api_changes_*.md 1> /dev/null 2>&1; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Changes Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for file in api_changes_*.md; do
              echo "- [$file](../artifacts/${{ github.run_id }}/diff-reports-${{ github.run_id }}/$file)" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ No API changes detected" >> $GITHUB_STEP_SUMMARY
          fi

  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [scrape]
    # Run if scrape succeeded, or if analyze-only mode (skip dependency)
    if: ${{ always() && (needs.scrape.result == 'success' || github.event.inputs.mode == 'analyze-only') && github.event.inputs.mode != 'scrape-only' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod   # root module (Go 1.24) — needed to build provider binary
          cache-dependency-path: |
            go.sum
            tools/cmd/scraper/go.sum

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: '~1.8'
          terraform_wrapper: false   # prevents ::error:: annotations from polluting schema stdout

      - name: Restore snapshots from cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            tools/cmd/scraper/.scraper_cache.json
            tools/cmd/scraper/snapshots/
            tools/cmd/scraper/docs_scraped/
          key: scraper-data-${{ github.run_id }}
          restore-keys: |
            scraper-data-

      - name: Generate Terraform provider schema
        env:
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
        run: |
          # Build the provider binary from source — avoids registry download and
          # the terraform_wrapper ::error:: stdout-pollution that corrupts schema.json.
          go build -o /tmp/terraform-provider-hyperping .

          # Configure dev_overrides so 'providers schema' uses the local binary.
          # No 'terraform init' is needed or safe with dev_overrides.
          cat > ~/.terraformrc <<'EOF'
          provider_installation {
            dev_overrides {
              "develeap/hyperping" = "/tmp"
            }
            direct {}
          }
          EOF

          # Extract schema; stderr (dev_overrides warning) is silenced.
          if terraform -chdir=examples/complete providers schema -json \
              > /tmp/schema.json 2>/tmp/tf-schema-err; then
            if python3 -c "import json,sys; json.load(open('/tmp/schema.json'))" 2>/dev/null; then
              echo "SCHEMA_AVAILABLE=true" >> "$GITHUB_ENV"
              echo "✅ Schema generated ($(wc -c < /tmp/schema.json) bytes)"
            else
              echo "SCHEMA_AVAILABLE=false" >> "$GITHUB_ENV"
              echo "⚠️ Schema JSON is invalid — coverage will be skipped"
              head -3 /tmp/schema.json || true
            fi
          else
            echo "SCHEMA_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "⚠️ Could not generate provider schema — coverage will be skipped"
            cat /tmp/tf-schema-err || true
          fi

      - name: Build scraper
        working-directory: tools/cmd/scraper
        run: go build -o scraper

      - name: Run coverage analysis
        working-directory: tools/cmd/scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
        run: |
          if [ "${SCHEMA_AVAILABLE}" = "true" ]; then
            ./scraper -analyze -schema-file=/tmp/schema.json -snapshot-dir=./snapshots \
              2>&1 | tee analyze.log
          else
            echo "Provider schema unavailable — skipping coverage analysis" | tee analyze.log
          fi
          exit 0

      - name: Upload analysis logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: analysis-logs-${{ github.run_id }}
          path: tools/cmd/scraper/analyze.log
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: coverage-report-${{ github.run_id }}
          path: tools/cmd/scraper/coverage_report*.md
          retention-days: 90
          if-no-files-found: ignore

      - name: Post analysis summary
        if: always()
        run: |
          cd tools/cmd/scraper

          echo "## Coverage Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Include coverage report if available (find latest)
          REPORT=$(ls -t coverage_report_*.md 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            cat "$REPORT" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No coverage report generated" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the analysis logs for details." >> $GITHUB_STEP_SUMMARY
          fi
