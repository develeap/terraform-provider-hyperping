apiVersion: darktitan.io/v1
kind: Flow
metadata:
  name: hyperping-prom-refactor

use:
  - superpowers
  - claude-mem

model: sonnet

spec:
  stages:

    # ─────────────────────────────────────────────────────────────
    # Stage 1: Audit
    # Read every file touched in the Prometheus/Grafana integration
    # and produce a concrete, prioritised issue list.
    # ─────────────────────────────────────────────────────────────
    - name: audit
      model: opus
      prompt: |
        You are auditing the Prometheus/Grafana integration that was just
        added to the Hyperping Terraform provider. Read EVERY file listed
        below completely before writing a single finding.

        FILES TO READ:
          cmd/hyperping-exporter/collector.go
          cmd/hyperping-exporter/collector_test.go
          cmd/hyperping-exporter/main.go
          deploy/prometheus/alerts.yml
          deploy/prometheus/recording-rules.yml
          deploy/prometheus/prometheus.yml
          deploy/grafana/dashboards/fleet-overview.json
          deploy/grafana/dashboards/tenant-health.json
          deploy/grafana/dashboards/shared-infrastructure.json
          deploy/grafana/provisioning/datasources/prometheus.yml
          deploy/grafana/provisioning/dashboards/dashboards.yml
          deploy/docker-compose.yml
          deploy/k8s/deployment.yaml
          deploy/k8s/service.yaml
          deploy/k8s/servicemonitor.yaml
          internal/client/interface.go
          internal/client/models_outage.go
          internal/client/models_report.go

        After reading all files, produce AUDIT.md at the repo root with
        this exact structure:

        # Audit: Hyperping Prometheus/Grafana Integration

        ## Critical Issues (must fix — will cause bugs or test failures)
        [List each issue: file, line range, what is wrong, what the fix must be]

        ## Major Issues (should fix — correctness, clarity, maintainability)
        [List each issue: file, what is wrong, concrete fix]

        ## Minor / Style Issues (nice to have)
        [List]

        ## What Is Already Good (do not change these things)
        [Explicit list of things to preserve]

        ## Refactoring Plan
        [Ordered list of concrete steps the Refactor stage must follow]

        AUDIT CHECKLIST — assess every item:
        1. collector.go file size: if over 400 lines, plan a clean split
           (e.g. collector_describe.go for all Desc fields + NewCollector,
            collector_collect.go for Collect + helpers)
        2. Refresh() complexity: can goroutine fan-out be extracted to a
           named helper without changing behaviour?
        3. Error handling in Refresh: are all partial-failure paths logged
           consistently and cache state left coherent?
        4. HyperpingAPI interface in collector.go: is the local interface
           compatible with the full client.HyperpingAPI? Verify against
           internal/client/interface.go
        5. Test coverage: are all new helpers (buildActiveOutageIndex,
           escalationTier, avgSLAForPeriod, computeHealthScore) unit-tested?
           Are error paths for outage/report fetch tested?
        6. Prometheus naming: no _count / _total / _sum / _bucket reserved
           suffixes on gauge metrics. Check all new metric names.
        7. Prometheus label cardinality: are any label values unbounded?
        8. Alert rule correctness: do all PromQL exprs reference metrics
           that actually exist in the exporter? Check every alert.
        9. Recording rule correctness: same check — do the recording rule
           exprs reference real metrics?
        10. Docker Compose: does the exporter service have a proper
            HYPERPING_API_KEY env var passthrough?
        11. K8s manifests: security context, resource limits, health probes,
            secret name consistency
        12. Grafana dashboard JSON: are the panel queries syntactically valid
            PromQL? Do they reference real metric names?
        13. Any dead code or unreachable paths introduced
        14. Go idioms: unused imports, shadowed variables, missing error
            wraps

    # ─────────────────────────────────────────────────────────────
    # Stage 2: Refactor
    # Apply every fix from AUDIT.md in the order specified.
    # Do NOT add features — only fix, clarify, and clean.
    # ─────────────────────────────────────────────────────────────
    - name: refactor
      prompt: |
        Read AUDIT.md at the repo root carefully. Apply every fix listed
        in "Critical Issues", "Major Issues", and the "Refactoring Plan"
        section. Follow the plan steps in the exact order given.

        HARD CONSTRAINTS:
        - Do NOT add any new metric types or business logic.
        - Do NOT change metric names that already exist (breaking change
          for existing dashboards / alerts).
        - Keep all existing tests passing — do not delete tests.
        - If you split collector.go into multiple files, every existing
          test in collector_test.go must still compile and pass unchanged
          (they are all in package main so they see all files).
        - After all edits, run:
            go build ./cmd/hyperping-exporter/
            go test ./cmd/hyperping-exporter/ -v -count=1
          Both must succeed with zero errors before you finish this stage.
        - Fix any failures you encounter before finishing.
        - Remove AUDIT.md when done.

        Output a brief summary of every change made (file, what changed,
        why) so the Code-Review stage has context.

      gate_type: test-results
      max_iterations: 3
      escalation: ai-decide
      loop_target_stage: refactor

    # ─────────────────────────────────────────────────────────────
    # Stage 3: Full Test Suite
    # Run the complete make test + make lint pass.
    # ─────────────────────────────────────────────────────────────
    - name: test
      prompt: |
        Run the full test suite and linter for the repository:

          make test
          make lint

        If either command fails:
        1. Read the full error output carefully.
        2. Fix every failure — do not suppress or skip tests.
        3. Re-run the failing command after each fix.
        4. Continue until both commands exit 0.

        Special attention:
        - If golangci-lint flags anything in cmd/hyperping-exporter/,
          fix it even if the test suite itself passes.
        - If there are any "should not have _count suffix" or similar
          Prometheus lint warnings from testutil.CollectAndLint, fix
          the metric name and update every reference in tests and YAML files.

        When both commands pass cleanly, output:
          "make test: PASS"
          "make lint: PASS"
          Summary of any fixes applied.

      gate_type: test-results
      max_iterations: 4
      escalation: pause
      loop_target_stage: test

    # ─────────────────────────────────────────────────────────────
    # Stage 4: Code Review
    # Final review. Gate loops back to Refactor if issues remain.
    # ─────────────────────────────────────────────────────────────
    - name: code-review
      prompt: |
        Perform a final code review of the Prometheus/Grafana integration
        after refactoring. Focus on the following files:

          cmd/hyperping-exporter/      (all .go files)
          deploy/prometheus/alerts.yml
          deploy/prometheus/recording-rules.yml
          deploy/grafana/dashboards/   (all .json files)
          deploy/docker-compose.yml
          deploy/k8s/

        Review criteria:
        1. Correctness — does every metric, alert, and recording rule
           reference a real metric name that the exporter emits?
        2. Completeness — are all OPS-31/32/33/34/35/39 items implemented
           and visibly traceable to the code?
        3. Code quality — functions ≤50 lines, files ≤400 lines (target),
           clear names, no debug leftovers, no TODO comments
        4. Test quality — every non-trivial helper has a unit test,
           error paths are covered, CollectAndLint passes
        5. Security — no secrets hardcoded, API key only via env/flag,
           K8s secret placeholder clearly marked
        6. Operational readiness — Docker Compose starts cleanly,
           K8s manifests have resource limits and health probes

        If ALL criteria pass:
          Output: "LGTM — integration is production-ready."
          List what was improved vs. the original.

        If any issues remain:
          Create REVIEW_ISSUES.md with: file, severity, description, fix.
          End with: "Issues written to REVIEW_ISSUES.md — looping back."

      gate_type: ai-evaluation
      max_iterations: 2
      escalation: ai-decide
      loop_target_stage: refactor
